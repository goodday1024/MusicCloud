name: iOS Build

on:
  workflow_dispatch:
    inputs:
      signed_build:
        description: "同时导出签名 ipa（需要证书和描述文件 secrets）"
        required: true
        default: false
        type: boolean
      export_method:
        description: "签名导出类型"
        required: true
        default: app-store
        type: choice
        options:
          - app-store
          - ad-hoc
          - development

jobs:
  ios-simulator:
    name: 构建 iOS 模拟器包
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Sync web assets to iOS
        env:
          CI: "true"
        run: npm run cap:sync:ios

      - name: Build simulator app
        run: |
          set -euo pipefail
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData-sim" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload simulator app
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: ${{ runner.temp }}/DerivedData-sim/Build/Products/Release-iphonesimulator/App.app
          if-no-files-found: error

  ios-unsigned-ipa:
    name: 导出未签名 IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Sync web assets to iOS
        env:
          CI: "true"
        run: npm run cap:sync:ios

      - name: Build unsigned device app
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData-unsigned" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned ipa
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$RUNNER_TEMP/DerivedData-unsigned/Build/Products/Release-iphoneos/App.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Unsigned device app not found: $APP_PATH" >&2
            exit 1
          fi

          PAYLOAD_DIR="$RUNNER_TEMP/unsigned-ipa/Payload"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$APP_PATH" "$PAYLOAD_DIR/App.app"

          mkdir -p "$RUNNER_TEMP/artifacts"
          ditto -c -k --sequesterRsrc --keepParent "$PAYLOAD_DIR" "$RUNNER_TEMP/artifacts/App-unsigned.ipa"

      - name: Upload unsigned ipa
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: ${{ runner.temp }}/artifacts/App-unsigned.ipa
          if-no-files-found: error

  ios-signed-ipa:
    name: 导出签名 IPA
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.signed_build }}
    runs-on: macos-latest

    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
      IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate signing secrets
        run: |
          set -euo pipefail
          for key in APPLE_TEAM_ID IOS_CERTIFICATE_P12_BASE64 IOS_CERTIFICATE_PASSWORD IOS_PROVISIONING_PROFILE_BASE64 KEYCHAIN_PASSWORD; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret: $key" >&2
              exit 1
            fi
          done

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Sync web assets to iOS
        env:
          CI: "true"
        run: npm run cap:sync:ios

      - name: Install signing assets
        shell: bash
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/signing-cert.p12"
          PROFILE_RAW_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PROFILE_PLIST_PATH="$RUNNER_TEMP/profile.plist"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          CERT_PATH="$CERT_PATH" PROFILE_RAW_PATH="$PROFILE_RAW_PATH" python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["CERT_PATH"]).write_bytes(base64.b64decode(os.environ["IOS_CERTIFICATE_P12_BASE64"]))
          Path(os.environ["PROFILE_RAW_PATH"]).write_bytes(base64.b64decode(os.environ["IOS_PROVISIONING_PROFILE_BASE64"]))
          PY

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -f pkcs12 -A -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$PROFILE_RAW_PATH" > "$PROFILE_PLIST_PATH"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$PROFILE_PLIST_PATH")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' "$PROFILE_PLIST_PATH")
          cp "$PROFILE_RAW_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Read bundle identifier
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_IDENTIFIER="$(xcodebuild -showBuildSettings -project ios/App/App.xcodeproj -scheme App -configuration Release | awk -F ' = ' '/PRODUCT_BUNDLE_IDENTIFIER/ {print $2; exit}')"
          if [ -z "$BUNDLE_IDENTIFIER" ]; then
            echo "Failed to read PRODUCT_BUNDLE_IDENTIFIER" >&2
            exit 1
          fi
          echo "BUNDLE_IDENTIFIER=$BUNDLE_IDENTIFIER" >> "$GITHUB_ENV"

      - name: Archive iOS app
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData-device" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            archive

      - name: Export ipa
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${{ inputs.export_method }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_IDENTIFIER</key>
              <string>$PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/exported-ios" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

      - name: Upload signed ipa
        uses: actions/upload-artifact@v4
        with:
          name: ios-signed-ipa
          path: ${{ runner.temp }}/exported-ios/*.ipa
          if-no-files-found: error
